<div class="content-header">
  <span> مدیریت گروههای شهروندی</span>

</div>

<div class="d-flex my-5 p-5 align-items-center justify-content-center" *ngIf="loading">
  <mat-spinner diameter="50" color="default"></mat-spinner>
</div>

<mat-card class="custom-card">

  <form [formGroup]="form" *ngIf="!loading">
    <div class="row my-4">


      <mat-form-field class="col-sm-6 col-md-4">
        <mat-label> گروه </mat-label>
        <mat-select formControlName="groupId">
          <mat-option [value]="item.key" *ngFor="let item of groupList">
            {{item.text}}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="form.get('groupId').errors?.required"> نقش را مشخص کنید</mat-error>
      </mat-form-field>
      <mat-form-field class="col-md-3">
        <mat-label> تاریخ انقضاء اختیاری</mat-label>
        <input matInput [matDatepicker]="dpS" formControlName="expireDate">
        <mat-datepicker-toggle matSuffix [for]="dpS"></mat-datepicker-toggle>
        <mat-datepicker #dpS></mat-datepicker>
        <mat-error *ngIf="form.get('expireDate').errors?.required">
          تاریخ انقضاء را مشخص کنید.
        </mat-error>
        <mat-error *ngIf="form.get('expireDate').errors?.matDatepickerParse">
          فرمت تاریخ صحیح نیست
        </mat-error>
      </mat-form-field>

      <div class="col d-flex align-items-center justify-content-start">
        <button mat-raised-button color="default" (click)="save()" [disabled]="isSaving">
          <span>اضافه کردن</span>
          <mat-spinner color="default" diameter="20" [hidden]="!isSaving"></mat-spinner>
        </button>
      </div>
    </div>
  </form> 

  <div class="container">
    <div class="row">
      <div class="col-md-12">

        <div class="py-4 list-container">
          <div class="list-item" *ngFor="let item of citizengroupList">
            <div class="list-content">
              <div class="row"> 
                <div class="col-sm-3">
                  <span>
                    {{item.group}}



                  </span>
                  <span>
                   ( {{item.creationDate|jalali}})



                  </span>
                </div>
              </div>
            </div>

            <div class="menu">

              <button mat-icon-button (click)="delete(item)" *ngIf="!item.loading" matTooltip="حذف">
                <i class="fa fa-trash"></i>
              </button>
              <mat-spinner *ngIf="item.loading" color="default" diameter="25"></mat-spinner>
            </div>
          </div>
        </div>

        <div class="no-any-items" *ngIf="citizengroupList.length==0 && !loading">
          <i class="fa fa-info-circle"></i>
          اطلاعاتی ثبت نشده است
        </div>
        <div class="p-5 d-flex align-items-center justify-content-center" *ngIf="loading">
          <mat-spinner diameter="50" color="default"></mat-spinner>
        </div>
      </div>
      <div class="col-md-6"></div>
    </div>
  </div>

  <mat-card-footer></mat-card-footer>
</mat-card>
