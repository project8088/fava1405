<div cdkDrag cdkDragRootElement=".cdk-overlay-pane" mat-dialog-title>
  <h5 cdkDragHandle class="title py-0">
    دلیل حذف عضو خانواده {{ citizen.family.familyCitizen }}
    {{ citizen.family.familyNationCode }}
  </h5>

  <button
    type="button"
    class="close-btn"
    aria-label="Close"
    mat-dialog-close
    mat-icon-button
  >
    <span aria-hidden="true">&times;</span>
  </button>
</div>
<mat-dialog-content>
  <form [formGroup]="form" class="mx-3">
    <div class="row my-2">
      <mat-form-field  appearance="fill" class="h-100 textarea-field col-12">
        <mat-label>توضیحات</mat-label>
        <textarea
          matInput
          formControlName="description"
        ></textarea>
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button
    mat-raised-button
    color="default"
    [disabled]="isSaving"
    (click)="saveInfo()"
  >
    <span>حذف </span>
    <mat-spinner
      diameter="20"
      color="default"
      [hidden]="!isSaving"
    ></mat-spinner>
  </button>
  <button mat-raised-button mat-dialog-close>انصراف</button>
</mat-dialog-actions>
