<div cdkDrag cdkDragRootElement=".cdk-overlay-pane" mat-dialog-title>
    <h5 cdkDragHandle class="title" *ngIf="!isUpdate"> ثبت گروه محصول جدید</h5> 
    <h5 cdkDragHandle class="title" *ngIf="isUpdate">ویرایش گروه محصول </h5> 


    <button type="button" class="close-btn" aria-label="Close" mat-dialog-close mat-icon-button>
    <span aria-hidden="true">&times;</span>
  </button>
</div>
<mat-dialog-content>

  <form [formGroup]="form">


    <div class="row">
      <mat-form-field class="col-sm-6 col-md-6">
        <mat-label>گروه محصول </mat-label>
        <mat-select formControlName="parentId">
          <mat-option [value]="item.key" *ngFor="let item of parentProductList">{{item.text}}</mat-option> 
        </mat-select>
        <mat-error *ngIf="form.get('parentId').errors?.required">
          گروه محصول را مشخص کنید.
        </mat-error>
      </mat-form-field>


      <mat-form-field class="col-sm-6 col-md-6">
        <mat-label>عنوان گوه محصول</mat-label>
        <input matInput formControlName="name" autocomplete="doNotAutoComplete">
        <mat-error *ngIf="form.get('name').errors?.required">
          عنوان گروه محصول را وارد کنید.
        </mat-error> 
      </mat-form-field>
      </div>

    <p>
      <mat-checkbox color="default" formControlName="isActive">
        فعال/غیرفعال
      </mat-checkbox>
    </p>
    </form>




</mat-dialog-content>
<mat-dialog-actions>
  <button mat-raised-button  mat-dialog-close>انصراف</button>
  <button mat-raised-button color="default" [disabled]="isSaving" (click)="saveInfo()">
    <span>ذخیره </span>
    <mat-spinner diameter="20" color="default" [hidden]="!isSaving"></mat-spinner>
  </button>
</mat-dialog-actions>
