<mat-card class="m-3">
  <mat-card-header class="card-header mx-n3 mt-n3"
    >ویرایش ایمیل</mat-card-header
  >
  <mat-card-content>
    <div
      class="p-5 d-flex align-items-center justify-content-center"
      *ngIf="loading"
    >
      <mat-spinner diameter="50" color="default"></mat-spinner>
    </div>

    <div *ngIf="!formIsShowing">
      <button
        mat-raised-button
        color="default"
        *ngIf="!formIsShowing"
        (click)="showForm()"
      >
        اضافه کردن ایمیل
        <i class="fa fa-plus"></i>
      </button>
    </div>
    <form
      *ngIf="formIsShowing && !loading"
      [formGroup]="cardForm"
      class="mx-4 mt-4"
    >
      <div>
        <span class="px-3">{{ cardForm.get("email").value }}</span>
        <span *ngIf="!isConfirm" class="text-danger mx-2">(تایید نشده)</span>
        <span *ngIf="isConfirm" class="text-success mx-2">(تایید شدده)</span>
        <button
          mat-raised-button
          color="default"
          *ngIf="!editMode"
          (click)="toggleEditMode()"
        >
          ویرایش
        </button>
      </div>
      <div *ngIf="editMode">
        <mat-form-field appearance="outline" class="col-sm-6 col-md-4">
          <mat-label> ایمیل </mat-label>
          <input
            matInput
            formControlName="email"
            class="text-left"
            minlength="10"
          />
          <mat-error *ngIf="cardForm.get('email').errors?.required">
            ایمیل خود را وارد کنید.
          </mat-error>
          <mat-error *ngIf="cardForm.get('email').errors?.invalid">
            ایمیل وارد شده صحیح نیست
          </mat-error>
        </mat-form-field>
        <span [hidden]="!codeSent">
          ارسال مجدد کد
          <app-timer #timer></app-timer>
        </span>

        <button
          mat-raised-button
          color="default"
          *ngIf="!loading"
          [disabled]="codeSent"
          (click)="sendCode()"
        >
          <span *ngIf="!codeSent">دریافت کد تغییر ایمیل </span>
        </button>
      </div>
    </form>
    <form [formGroup]="confirmForm" *ngIf="codeSent" class="mx-4">
      <mat-form-field appearance="outline" class="col-sm-6 col-md-4">
        <mat-label>کد تایید دریافتی </mat-label>
        <input
          matInput
          formControlName="smsActiveCode"
          class="text-left"
          minlength="10"
          numbersOnly
        />
        <mat-error *ngIf="confirmForm.get('smsActiveCode').errors?.required">
          کد تایید دریافتی را وارد کنید.
        </mat-error>
        <mat-error *ngIf="confirmForm.get('smsActiveCode').errors?.invalid">
          کد تایید وارد شده صحیح نیست
        </mat-error>
      </mat-form-field>
      <button
        mat-raised-button
        color="default"
        *ngIf="!loading"
        [disabled]="isSaving"
        (click)="saveForm()"
      >
        <span> تایید </span>
        <mat-spinner
          diameter="20"
          color="default"
          [hidden]="!isSaving"
        ></mat-spinner>
      </button>
    </form>
  </mat-card-content>
</mat-card>
