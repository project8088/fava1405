<div class="content-header">
  <span> دسترسی کاربران</span>
  <div class="bread-crumbs">
    <div class="bread-crumb-item" routerLink="/card/dashboard">داشبورد</div>
    <div class="bread-crumb-item" routerLink="/card/card-users">کاربران</div>
    <div class="bread-crumb-item active">دسترسی گروه کاربری</div>
  </div>
</div>


<mat-card class="custom-card">
  <mat-card-header class="d-flex align-items-center justify-content-end">
 
  </mat-card-header>
  <mat-card-content>
  
<crd-tree-user-card-permission [permissionItems]="data"></crd-tree-user-card-permission>
  </mat-card-content>
  <mat-card-footer>

    <div class="p-5">
      <button mat-raised-button color="default" [disabled]="isSaving" (click)="savePermissions()">
        <span>ذخیره</span>
        <mat-spinner color="default" diameter="20" [hidden]="!isSaving"></mat-spinner>
      </button>
    </div>

  </mat-card-footer>
</mat-card>
