<div class="page">
  <div class="container d-flex align-items-center justify-content-center">
    <div class="d-flex my-5 p-5 align-items-center justify-content-center" *ngIf="loadingData">
      <mat-spinner diameter="50" color="default"></mat-spinner>
    </div>

    <mat-card *ngIf="!loadingData" class="col-12 col-md-8 col-lg-8 mt-5">
      <mat-card-header class="mx-2">
        <h4 *ngIf="service.serviceName" class="text-primary border-button">
          قوانین و مقررات ثبت نام {{ service.serviceName }}
        </h4>
      </mat-card-header>
      <mat-card-content class="mx-2">
        <div *ngIf="service.haveTerms" [innerHtml]="service.terms"></div>
      </mat-card-content>

      <mat-card-actions class="text-right m-2">
        <button
          mat-raised-button
          color="primary"
          routerLink="/userregister/preregister"
          [queryParams]="{ serviceId: serviceId }"
        >
          ثبت نام
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
