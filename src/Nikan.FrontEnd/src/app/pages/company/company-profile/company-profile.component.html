<div class="content-header">
  <span>اطلاعات شرکت</span>
</div>

<mat-card class="custom-card">
  <mat-card-header class="d-flex align-items-center justify-content-end">
    @if (user?.isAdmin) {
      <button mat-stroked-button color="default" (click)="back()">باز گشت</button>
    }
  </mat-card-header>
  <mat-tab-group>
    <mat-tab>
      <ng-template mat-tab-label> اطلاعات اصلی شرکت </ng-template>
      <ng-template matTabContent>
        <div class="p-3">
          <company-base-info></company-base-info>
        </div>
      </ng-template>
    </mat-tab>
    <mat-tab>
      <ng-template mat-tab-label> اطلاعات آدرس </ng-template>
      <ng-template matTabContent>
        <div class="p-3">
          <company-address-info></company-address-info>
        </div>
      </ng-template>
    </mat-tab>
    <mat-tab>
      <ng-template mat-tab-label> فعالیت های شرکت </ng-template>
      <ng-template matTabContent>
        <div class="p-3">
          <company-activity-info></company-activity-info>
        </div>
      </ng-template>
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label> سایر اطلاعات شرکت </ng-template>
      <ng-template matTabContent>
        <div class="p-3">
          <company-main-info></company-main-info>
        </div>
      </ng-template>
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label> نمونه مهر و امضا </ng-template>
      <ng-template matTabContent>
        <div class="p-3">
          <company-signature-info></company-signature-info>
        </div>
      </ng-template>
    </mat-tab>

    @if (user?.isAdmin) {
      <mat-tab>
        <ng-template mat-tab-label> اطلاعات تکمیلی </ng-template>
        <ng-template matTabContent>
          <div class="p-3">
            <company-additional-info></company-additional-info>
          </div>
        </ng-template>
      </mat-tab>
    }
  </mat-tab-group>

  <mat-card-content> </mat-card-content>
  <mat-card-footer></mat-card-footer>
</mat-card>
