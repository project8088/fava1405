 

<main class="main-content">

  <!-- Blogs Area -->
  <div class="">
    <div class="container p-md-5 box p-4 mt-4">
      <nav aria-label="breadcrumb ">
        <ol class="breadcrumb mb-0 rad25">
            <li class="breadcrumb-item"><a routerLink="/webuser/dashboard"> داشبورد  </a></li>
            
            <li class="breadcrumb-item active" aria-current="page">
              {{news?.title}}
            </li>
        </ol>
    </nav>

      <div class="row mt-3">
        <div class="col-lg-12 col-12">
          <div class="d-flex align-items-center justify-content-center py-5" *ngIf="loadingData">
            <mat-spinner color="default"></mat-spinner>
          </div>
          <div class="d-flex align-items-center justify-content-center py-5" *ngIf="loadingData==false && !news">
            <strong>اطلاعاتی وجود ندارد!</strong>
          </div>

          <div class="tm-blog tm-blog-details sticky-sidebar">
            <div *ngIf="!loadingData && news"> 
              <div class="tm-blog-content">
                <div class="tm-blog-meta">
                  <span><i class="fa fa-calendar-o"></i>
                  آخرین ویرایش سرویس
                  :
                  {{news?.onDate|jalali:'dddd DD MMMM YYYY'}}


                  </span>
                </div>
                
                <blockquote>
                  <p>
                    {{news?.description}}
                  </p>
                </blockquote>




                <div [innerHtml]="news?.body|safeHtml">
                </div>


                <app-attachments [guid]="news?.attachmentFileGroup"></app-attachments>



              </div>
              <div class="tm-blog-tags">
                <span class="tm-blog-tags-title">
                  <i class="fa fa-tags"></i>
                </span>
                <ul>
                  <li *ngFor="let item of tags"><a>{{item}}</a></li>
                </ul>
              </div>

            </div>

          
          

          </div>
        </div>
        
      </div>
    </div>
  </div>
  

</main>
