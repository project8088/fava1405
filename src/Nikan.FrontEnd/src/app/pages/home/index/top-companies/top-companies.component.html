<section class="container text-center pt-4 mt-5">
  <h5 class="bt-color">شرکت های برتر</h5>
  <p>برخی از برترین برندها</p>

  <owl-carousel-o [options]="owlOptions">
    @for (item of data; track $index) {
      <ng-template carouselSlide>
        <div class="card mx-2">
          <a routerLink="/home/co/{{ item.id }}">
            <img [src]="baseUrl + item.imageUrl" />
            <p class="pt-2">{{ item.companyName }}</p>
          </a>
        </div>
      </ng-template>
    }
  </owl-carousel-o>
</section>
