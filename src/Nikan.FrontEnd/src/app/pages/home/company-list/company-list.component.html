<main class="main-content">
  <div class="container p-md-5 box p-4 mt-4" id="blog">
    <form [formGroup]="searchForm">
      <div class="row mb-4 d-flex align-items-start justify-content-start">
        <mat-form-field appearance="outline" class="col-sm-6 col-md-4">
          <mat-label>جستجو</mat-label>
          <input matInput formControlName="title" />
        </mat-form-field>

        <button mat-icon-button color="default" (click)="applyFilter()" class="mt-2">
          <i class="fa fa-search"></i>
          <!-- <span>جستجو</span> -->
        </button>
      </div>
    </form>

    <div class="d-flex align-items-center justify-content-center">
      <div *ngIf="isLoadingResults">
        <mat-spinner *ngIf="isLoadingResults" color="default"></mat-spinner>
      </div>
      <div class="" *ngIf="isLoadingResults == false && listCount == 0">
        <strong>اطلاعاتی وجود ندارد!</strong>
      </div>
    </div>

    <div class="tm-blog-list">
      <div class="row mt-30-reverse blog-masonry-active">
        <div class="col-lg-4 col-md-6 col-12" *ngFor="let row of data">
          <div class="card p-2 mt-30">
            <a class="relative">
              <img
                [src]="baseUrl + row.imageUrl"
                alt="{{ row.companyName }}"
                *ngIf="row.imageUrl"
                class="mb-3 img-fluid rad12"
              />
            </a>

            <h5><i class="fa fa-industry mr-2"></i> {{ row.companyName }}</h5>
            <p>
              <i class="fa fa-user mr-2"></i>
              مدیر عامل: {{ row.managerName }}
            </p>
            <a routerLink="/home/co/{{ row.companyId }}" class="text-danger text-center pb-3"
              >مشاهده
            </a>
          </div>
        </div>
      </div>

      <div class="tm-pagination mt-50">
        <mat-paginator
          [length]="listCount"
          [pageSize]="10"
          [pageSizeOptions]="[5, 10, 50, 100, 250, 500, 1000]"
          showFirstLastButtons
          (page)="pageEvent($event)"
        ></mat-paginator>
      </div>
    </div>
  </div>
</main>
