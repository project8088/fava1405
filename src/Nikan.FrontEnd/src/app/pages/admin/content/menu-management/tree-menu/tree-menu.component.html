<ul class="tree-menu">
  <li *ngFor="let item of menuItems">
    <div class="menu-item" (click)="openMenuDialog(item)">
      <i class="{{ item.iconFile }}"></i>
      <span>{{ item.menuName }}</span>

      <div class="spacer"></div>

      <button mat-icon-button (click)="delete(item, $event)" matTooltip="حذف">
        <i class="fa fa-trash"></i>
      </button>
    </div>

    <adm-tree-menu [menuItems]="item.children" *ngIf="item.children.length > 0"></adm-tree-menu>
  </li>
</ul>
