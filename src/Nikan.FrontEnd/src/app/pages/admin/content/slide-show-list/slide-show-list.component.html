<div class="content-header">
  <span>اسلاید شو</span>

</div>


<mat-card class="custom-card">
  <mat-card-header>

  </mat-card-header>
  <mat-card-content>

    <div class="d-flex align-items-center justify-content-end">
      <button mat-raised-button color="default" (click)="openDialog('')">
        <i class="fa fa-plus mr-2"></i>
        <span>اضافه کردن اسلاید شو جدید</span>
      </button>
    </div>


    <form [formGroup]="searchForm">

      <div class="row my-4">





        <mat-form-field appearance="outline" class="col-sm-6 col-md-4">
          <mat-label>جستجو</mat-label>
          <input matInput formControlName="title" maxlength="100">
        </mat-form-field>







        <div class="col d-flex align-items-center justify-content-end">
          <button mat-raised-button color="default" (click)="applyFilter()">
            <i class="fa fa-search mr-2"></i>
            <span>جستجو</span>
          </button>
        </div>
      </div>
    </form>
    <div class="d-flex align-items-center justify-content-end mb-3">
      <button mat-raised-button color="default" (click)="exporter.exportTable('xlsx',{fileName:'excel'})">
        <i class="fa fa-file-excel mr-2"></i>
        خروجی اکسل
      </button>

    </div>
    <div class="d-flex align-items-center justify-content-end p-3">
      <button mat-icon-button color="default" (click)="getList()" matTooltip="بروز رسانی">
        <i class="fa fa-sync"></i>
      </button>
    </div>
    <div class="datatable-container mat-elevation-z8">
      <div class="datatable-loading-shade" *ngIf="isLoadingResults">
        <mat-spinner color="default"></mat-spinner>
      </div>
      <div class="datatable-loading-shade" *ngIf="isLoadingResults==false && listCount==0">
        <strong>اطلاعاتی وجود ندارد!</strong>
      </div>

      <div class="datatable-table-container">
        <table mat-table [dataSource]="data" class="datatable-table"  #exporter="matTableExporter" matTableExporter [hiddenColumns]="[displayedColumns.length-1]">
          <ng-container matColumnDef="row">
            <th mat-header-cell *matHeaderCellDef width="40">#</th>
            <td mat-cell *matCellDef="let row;let i=index;">
              {{paginator.pageIndex*paginator.pageSize + i + 1 }}
            </td>
          </ng-container>
          
    <ng-container matColumnDef="imageUrl">
            <th mat-header-cell *matHeaderCellDef>تصویر</th>
            <td mat-cell *matCellDef="let row">
              <img [src]="baseUrl+row.imageUrl" class="img-thumbnail thumb-64" *ngIf="row.imageUrl" />
            </td>
          </ng-container>

          <ng-container matColumnDef="caption">
            <th mat-header-cell *matHeaderCellDef>عنوان </th>
            <td mat-cell *matCellDef="let row">{{row.caption}}</td>
          </ng-container>

          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef>توضیحات</th>
            <td mat-cell *matCellDef="let row">{{row.description}}</td>
          </ng-container>

 
          <ng-container matColumnDef="isActive">
            <th mat-header-cell *matHeaderCellDef>فعال</th>
            <td mat-cell *matCellDef="let row">
              <span class="text-danger" *ngIf="!row.isActive">خیر</span>
              <span class="text-success" *ngIf="row.isActive">بله</span>
            </td>
          </ng-container>
          <ng-container matColumnDef="operation">
            <th mat-header-cell *matHeaderCellDef width="40">عملیات</th>
            <td mat-cell *matCellDef="let row">

              <button mat-icon-button [matMenuTriggerFor]="menu" *ngIf="!row.loading">
                <mat-icon>more_vert</mat-icon>
              </button>
              <mat-menu #menu="matMenu">
                <button mat-menu-item (click)="openDialog(row)">
                  <i class="fa fa-eye mr-2"></i>
                  <span>ویرایش</span>
                </button>

                <button mat-menu-item (click)="delete(row)">
                  <i class="fa fa-trash mr-2"></i>
                  <span>حذف</span>
                </button>
              </mat-menu>


            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns;sticky: true"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>


      <mat-paginator [length]="listCount" [pageSize]="10" [pageSizeOptions]="[5, 10,50,100, 250,500, 1000]" showFirstLastButtons>
      </mat-paginator>
    </div>


  </mat-card-content>
  <mat-card-footer></mat-card-footer>
</mat-card>
