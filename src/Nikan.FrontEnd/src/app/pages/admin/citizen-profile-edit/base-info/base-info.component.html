@if (loading) {
  <div class="d-flex my-5 p-5 align-items-center justify-content-center">
    <mat-spinner diameter="50" color="default"></mat-spinner>
  </div>
}

@if (userStatus === 1) {
  <div>
    <adm-citizen-Identity-Info></adm-citizen-Identity-Info>
  </div>
}
@if (userStatus != 1) {
  <div>
    <adm-update-citizen-Identity-Info></adm-update-citizen-Identity-Info>
  </div>
}
