<div cdkDrag cdkDragRootElement=".cdk-overlay-pane" mat-dialog-title>
  @if (isUpdate) {
    <h5 cdkDragHandle class="title">ویرایش گروه</h5>
  }
  @if (!isUpdate) {
    <h5 cdkDragHandle class="title">ثبت گروه جدید</h5>
  }

  <button type="button" class="close-btn" aria-label="Close" mat-dialog-close mat-icon-button>
    <span aria-hidden="true">&times;</span>
  </button>
</div>
<mat-dialog-content>
  <form [formGroup]="userGroupsForm">
    <div class="row">
      <mat-form-field class="col-sm-12 col-md-12">
        <mat-label>نام گروه</mat-label>
        <input matInput formControlName="name" />
        @if (userGroupsForm.get('name').errors?.name) {
          <mat-error> نام گروه را وارد نمایید </mat-error>
        }
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-raised-button mat-dialog-close>انصراف</button>
  <button mat-raised-button color="default" [disabled]="isSaving" (click)="saveInfo()">
    <span>ذخیره </span>
    <mat-spinner diameter="20" color="default" [hidden]="!isSaving"></mat-spinner>
  </button>
</mat-dialog-actions>
