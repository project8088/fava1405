<div class="content-header">
  <span> گروههای کاربری</span>
</div>

<mat-card class="m-3">
  <mat-card-header class="card-header">
    <div class="d-flex col align-items-center justify-content-between">
      گروههای کاربری
      <button mat-raised-button color="default" (click)="openAddUserDialog()">
        <i class="fa fa-plus mr-2"></i>
        ثبت گروه جدید
      </button>
    </div>
  </mat-card-header>
  <mat-card-content>
    <div class="p-4 list-container">
      @for (item of userGroupList; track item) {
        <div class="list-item">
          <div class="list-content" (click)="openAddUserDialog(item)">
            <div class="row">
              <div class="col-sm-12">
                <strong>گروه: </strong><span> {{ item.name }}</span>
              </div>
            </div>
          </div>
          <div class="menu">
            @if (!item.loading) {
              <button mat-icon-button (click)="openUpdateUserDialog(item)" matTooltip="ویرایش">
                <i class="fa fa-edit"></i>
              </button>
            }
            @if (!item.loading) {
              <button mat-icon-button (click)="deleteUserGroup(item)" matTooltip="حذف">
                <i class="fa fa-trash"></i>
              </button>
            }
            <button mat-icon-button routerLink="/admin/permissions/{{ item.id }}">
              <i class="fa fa-folder-tree mr-2"></i>
            </button>
            @if (item.loading) {
              <mat-spinner color="default" diameter="25"></mat-spinner>
            }
          </div>
        </div>
      }
    </div>

    @if (userGroupList.length == 0 && !loading) {
      <div class="no-any-items">
        <i class="fa fa-info-circle"></i>
        اطلاعاتی ثبت نشده است
      </div>
    }
    @if (loading) {
      <div class="p-5 d-flex align-items-center justify-content-center">
        <mat-spinner diameter="50" color="default"></mat-spinner>
      </div>
    }
  </mat-card-content>
  <mat-card-footer></mat-card-footer>
</mat-card>
