<div class="content-header">
  <span>تست پرداخت</span>
</div>

<mat-card class="custom-card">
  <mat-card-header> </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form">
      <div class="row my-4">
        <mat-form-field class="col-sm-6 col-md-4">
          <mat-label>شناسه پرداخت</mat-label>
          <input matInput formControlName="orderId" maxlength="100" numbersOnly />
          <mat-error *ngIf="form.get('orderId').errors?.required"
            >شناسه پرداخت را وارد کنید.</mat-error
          >
        </mat-form-field>

        <mat-form-field class="col-sm-6 col-md-4">
          <mat-label>مبلغ</mat-label>
          <input matInput formControlName="amount" maxlength="100" numbersOnly />
          <span matSuffix>ریال</span>
          <mat-error *ngIf="form.get('amount').errors?.required">مبلغ را وارد کنید.</mat-error>
        </mat-form-field>

        <div class="col d-flex align-items-center">
          <button mat-raised-button color="default" (click)="pay()" [disabled]="loading">
            <i class="fa fa-money-check mr-2"></i>
            <span>پرداخت</span>
            <mat-spinner [hidden]="!loading" diameter="20" color="default"></mat-spinner>
          </button>
        </div>
      </div>
    </form>
    <form
      [hidden]="true"
      id="payFormMellat"
      method="post"
      action="https://bpm.shaparak.ir/pgwchannel/startpay.mellat"
    >
      <input type="text" name="RefId" id="RefId" [(ngModel)]="RefId" />
    </form>
    <div class="alert alert-info p-5" *ngIf="waitForRedirectToBank">
      در حال اتصال به درگاه پرداخت...
    </div>
  </mat-card-content>
  <mat-card-footer></mat-card-footer>
</mat-card>
