<div class="content-header">
  <span> خدمات شهروندی </span>
</div>

<mat-card class="custom-card">
  <mat-card-header> </mat-card-header>
  <mat-card-content>
    <div class="d-flex align-items-center justify-content-end">
      <button mat-raised-button color="default" routerLink="/admin/addupdate-appService/0">
        <i class="fa fa-plus mr-2"></i>
        <span>اضافه کردن خدمت جدید</span>
      </button>
    </div>

    <form [formGroup]="searchForm">
      <div class="row my-4">
        <mat-form-field class="col-sm-6 col-md-4">
          <mat-label>جستجو</mat-label>
          <input matInput formControlName="serviceName" maxlength="100" />
        </mat-form-field>

        <div class="col d-flex align-items-center">
          <button mat-raised-button color="default" (click)="applyFilter()">
            <i class="fa fa-search mr-2"></i>
            <span>جستجو</span>
          </button>
        </div>
      </div>
    </form>
    <div class="d-flex align-items-center justify-content-end mb-3">
      <button
        mat-raised-button
        color="default"
        (click)="exporter.exportTable('xlsx', { fileName: 'excel' })"
      >
        <i class="fa fa-file-excel mr-2"></i>
        خروجی اکسل
      </button>
      <button
        mat-icon-button
        color="default"
        (click)="getList()"
        matTooltip="بروز رسانی"
        class="ml-2"
      >
        <i class="fa fa-sync"></i>
      </button>
    </div>

    <div class="datatable-container mat-elevation-z8">
      <div class="datatable-loading-shade" *ngIf="isLoadingResults">
        <mat-spinner color="default"></mat-spinner>
      </div>
      <div class="datatable-loading-shade" *ngIf="isLoadingResults == false && listCount == 0">
        <strong>اطلاعاتی وجود ندارد!</strong>
      </div>

      <div class="datatable-table-container">
        <table
          mat-table
          [dataSource]="data"
          class="datatable-table"
          #exporter="matTableExporter"
          matTableExporter
          [hiddenColumns]="[displayedColumns.length - 1]"
        >
          <ng-container matColumnDef="row">
            <th mat-header-cell *matHeaderCellDef width="40">#</th>
            <td mat-cell *matCellDef="let row; let i = index">
              {{ paginator.pageIndex * paginator.pageSize + i + 1 }}
            </td>
          </ng-container>
          <ng-container matColumnDef="serviceId">
            <th mat-header-cell *matHeaderCellDef>شناسه سرویس</th>
            <td mat-cell *matCellDef="let row">{{ row.serviceId }}</td>
          </ng-container>

          <ng-container matColumnDef="serviceName">
            <th mat-header-cell *matHeaderCellDef>خدمت</th>
            <td mat-cell *matCellDef="let row">{{ row.serviceName }}</td>
          </ng-container>

          <ng-container matColumnDef="isActive">
            <th mat-header-cell *matHeaderCellDef>فعال</th>
            <td mat-cell *matCellDef="let row">
              <span class="text-danger" *ngIf="!row.isActive">خیر</span>
              <span class="text-success" *ngIf="row.isActive">بله</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="isLinkService">
            <th mat-header-cell *matHeaderCellDef>لینک سرویس</th>
            <td mat-cell *matCellDef="let row">
              <span class="text-danger" *ngIf="!row.isLinkService">خیر</span>
              <span class="text-success" *ngIf="row.isLinkService">بله</span>
            </td>
          </ng-container>
          <ng-container matColumnDef="isMain">
            <th mat-header-cell *matHeaderCellDef>نمایش برای ثبت نام</th>
            <td mat-cell *matCellDef="let row">
              <span class="text-danger" *ngIf="!row.isMain">خیر</span>
              <span class="text-success" *ngIf="row.isMain">بله</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="operation">
            <th mat-header-cell *matHeaderCellDef width="40">عملیات</th>
            <td mat-cell *matCellDef="let row">
              <button mat-icon-button [matMenuTriggerFor]="menu" *ngIf="!row.loading">
                <mat-icon>more_vert</mat-icon>
              </button>
              <mat-menu #menu="matMenu">
                <button
                  *ngIf="row.serviceId != 0"
                  mat-menu-item
                  routerLink="/admin/addupdate-appService/{{ row.serviceId }}"
                >
                  <i class="fa fa-eye mr-2"></i>
                  <span>ویرایش</span>
                </button>

                <button *ngIf="row.serviceId != 0" mat-menu-item (click)="delete(row)">
                  <i class="fa fa-trash mr-2"></i>
                  <span>حذف</span>
                </button>
              </mat-menu>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>

      <mat-paginator
        [length]="listCount"
        [pageSize]="100"
        [pageSizeOptions]="[100, 250, 500, 1000, 2000]"
        showFirstLastButtons
        (page)="pageEvent($event)"
      ></mat-paginator>
    </div>
  </mat-card-content>
  <mat-card-footer></mat-card-footer>
</mat-card>
