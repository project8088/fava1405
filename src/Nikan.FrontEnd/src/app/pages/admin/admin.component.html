<mat-sidenav-container
  class="sidenav-container dashboard {{ theme }}"
  [class.mini-side-bar]="miniSideBar"
>
  <mat-sidenav
    #drawer
    class="sidenav"
    [fixedInViewport]="true"
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false"
  >
    <div class="side-nav">
      <mat-toolbar color="teal">
        <button mat-icon-button (click)="miniSideBar = !miniSideBar">
          @if (miniSideBar) {
            <i class="fa fa-arrow-left"></i>
          }
          @if (!miniSideBar) {
            <i class="fa fa-arrow-right"></i>
          }
        </button>
        <span>پنل مدیریت</span>
      </mat-toolbar>
      <side-nav-menu [menu]="menuItems"></side-nav-menu>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="dashboard-content">
    <mat-toolbar color="teal" class="fixed-toolbar">
      @if (isHandset$ | async) {
        <button type="button" aria-label="Toggle sidenav" mat-icon-button (click)="drawer.toggle()">
          <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
        </button>
      }
      <!--<span>ادمین</span>-->
      <span class="spacer"></span>

      <button class="btn" (click)="logout()" matTooltip="خروج از حساب کاربری">
        <i class="fa fa-power-off mr-2"></i>
        <span>خروج</span>
      </button>

      <button mat-icon-button routerLink="/home" matTooltip="باز گشت به صفحه اصلی">
        <i class="fa fa-home"></i>
      </button>
    </mat-toolbar>
    <!-- Add Content Here -->

    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
