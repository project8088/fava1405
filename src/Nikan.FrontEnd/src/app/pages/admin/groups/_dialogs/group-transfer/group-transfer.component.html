<div cdkDrag cdkDragRootElement=".cdk-overlay-pane" mat-dialog-title>
  <h5 cdkDragHandle class="title">انتقال شهروندان داخل گروه</h5>

  <button type="button" class="close-btn" aria-label="Close" mat-dialog-close mat-icon-button>
    <span aria-hidden="true">&times;</span>
  </button>
</div>
<mat-dialog-content>
  <form [formGroup]="form">
    <div class="row">
      <mat-form-field class="col-sm-12">
        <mat-label>گروه مقصد را انتخاب کنید</mat-label>
        <mat-select formControlName="destinationGroupId" [compareWith]="compareFn">
          <mat-option [value]="item.key" *ngFor="let item of groupList">{{ item.text }}</mat-option>
        </mat-select>
        <mat-error *ngIf="form.get('destinationGroupId').errors?.required"
          >گروه مقصد را انتخاب کنید.</mat-error
        >
      </mat-form-field>
    </div>

    <p>
      <mat-checkbox color="default" formControlName="isTransfer">
        شهروندان در گروه مبدا حذف شوند؟
      </mat-checkbox>
    </p>
    <p>
      <mat-checkbox color="default" formControlName="isHasQueue">
        آیا صف شهروندی در نظرگرفته شود ؟
      </mat-checkbox>
    </p>
    <p>
      <mat-checkbox color="default" formControlName="isTransferQueue">
        در صورت درنظر گرفتن صف آیا از صف مبدا حذف شود ؟
      </mat-checkbox>
    </p>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-raised-button mat-dialog-close>انصراف</button>
  <button mat-raised-button color="default" [disabled]="isSaving" (click)="saveInfo()">
    <span>ذخیره </span>
    <mat-spinner diameter="20" color="default" [hidden]="!isSaving"></mat-spinner>
  </button>
</mat-dialog-actions>
