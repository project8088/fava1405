<div class="row" style="height: 100%">
  <div class="col-sm-2">
    <label class="upload-button mx-2 white-space-nowrap">
      انتخاب تصویر
      <input type="file" (change)="fileChangeEvent($event)" />
    </label>
    @if (croppedImage) {
      <div class="text-center">تصویر:</div>
    }
    <img [src]="croppedImage" class="img" />
    @if (croppedImage) {
      <div>
        <button
          mat-mini-fab
          color="default"
          aria-label="چرخش به راست"
          alt="چرخش به راست"
          (click)="rotateRight()"
        >
          <i class="fa fa-undo fa-flip-horizontal"></i>
        </button>
        <button
          mat-mini-fab
          color="default"
          aria-label="چرخش به چپ"
          alt="چرخش به چپ"
          (click)="rotateLeft()"
        >
          <i class="fa fa-undo"></i>
        </button>
      </div>
    }
  </div>
  <div class="col-sm-10" style="height: 100%">
    @if (loading) {
      <div class="loading-shade">
        <mat-spinner color="default"></mat-spinner>
      </div>
    }
    <image-cropper
      [imageBase64]="imageBase64"
      [imageChangedEvent]="imageChangedEvent"
      [maintainAspectRatio]="true"
      [aspectRatio]="3 / 4"
      format="png"
      class="text-center image-cropper"
      (imageCropped)="imageCropped($event)"
      (imageLoaded)="imageLoaded()"
      (cropperReady)="cropperReady()"
      (loadImageFailed)="loadImageFailed()"
      [canvasRotation]="canvasRotation"
      [roundCropper]="false"
    ></image-cropper>
  </div>
</div>

@if (showSaveButton) {
  <button mat-raised-button color="default" (click)="save()" [disabled]="saving">
    <mat-spinner diameter="20" color="default" [hidden]="!saving"></mat-spinner>
    <span>ذخیره</span>
  </button>
}
