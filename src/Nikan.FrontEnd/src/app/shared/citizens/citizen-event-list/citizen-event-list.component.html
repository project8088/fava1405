<mat-card class="custom-card">
  <mat-card-header class="d-flex align-items-center justify-content-end"> </mat-card-header>

  <mat-card-content>
    <div class="col-md-12">
      <table class="table table-striped">
        <thead>
          <tr>
            <th scope="col">تاریخ</th>
            <th scope="col">رویداد</th>
            <th scope="col">IP</th>
            <th scope="col">توضیحات</th>
          </tr>
        </thead>
        <tbody>
          @for (message of events; track message) {
            <tr>
              <th>{{ message.createDate | jalali: 'HH:mm YY/MM/DD' }}</th>
              <td>
                {{ message.eventSection }}
              </td>
              <td>
                {{ message.userIp }}
              </td>
              <td>{{ message.description }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </mat-card-content>
  <mat-card-footer></mat-card-footer>
</mat-card>
