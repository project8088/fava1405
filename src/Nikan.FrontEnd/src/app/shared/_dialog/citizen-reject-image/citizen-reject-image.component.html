<div cdkDrag cdkDragRootElement=".cdk-overlay-pane" mat-dialog-title>
  <h5 cdkDragHandle class="title py-0">
    عدم تایید تصویر {{ citizen.firstName }} {{ citizen.lastName }}
    {{ citizen.nationCode }}
  </h5>

  <button type="button" class="close-btn" aria-label="Close" mat-dialog-close mat-icon-button>
    <span aria-hidden="true">&times;</span>
  </button>
</div>
<mat-dialog-content>
  <form [formGroup]="form" class="mx-3">
    <div class="row my-2">
      <mat-form-field class="col-12">
        <mat-label>دلیل رد</mat-label>
        <mat-select formControlName="reason">
          @for (item of rejectCitizenPictureList; track $index) {
            <mat-option [value]="item.text">{{ item.text }} {{ item.key }} </mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field class="col-12">
        <mat-label>توضیحات</mat-label>
        <input matInput formControlName="reasonRejectCitizenPicture" />
      </mat-form-field>

      <div class="col-12">
        <mat-checkbox color="default" formControlName="sendSms"></mat-checkbox>
        <mat-label>پیامک ارسال شود</mat-label>
      </div>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-raised-button color="default" [disabled]="isSaving" (click)="saveInfo()">
    <span>ذخیره </span>
    <mat-spinner diameter="20" color="default" [hidden]="!isSaving"></mat-spinner>
  </button>
  <button mat-raised-button mat-dialog-close>انصراف</button>
</mat-dialog-actions>
