<div class="field-set">
  <label class="field-set-title">ثبت یادداشت بر روی تیکت</label>
  <form [formGroup]="frm">
    <div class="row">
      <mat-form-field class="col-sm-12">
        <mat-label>متن یادداشت</mat-label>
        <textarea rows="5" matInput formControlName="commentText" maxlength="1000"></textarea>
        <mat-error *ngIf="frm.get('commentText').errors?.required">
          متن یادداشت را وارد کنید
        </mat-error>
      </mat-form-field>
    </div>
    <div class="d-flex align-items-center justify-content-between">
      <p>
        <mat-checkbox color="default" formControlName="isPrivate">خصوصی</mat-checkbox>
      </p>
      <button mat-raised-button color="default" [disabled]="isSaving" (click)="save()">
        <mat-spinner [hidden]="!isSaving" diameter="20" color="default"></mat-spinner>
        <span>ذخیره</span>
      </button>
    </div>
  </form>
</div>

<mat-card *ngFor="let item of list" class="mt-3">
  <div
    class="card-title d-flex align-items-center justify-content-between"
    [class.light]="item.userOwnerId == user?.userId"
  >
    <div>
      <strong class="tag" *ngIf="item.isPrivate">خصوصی </strong>
      <strong>{{ item.userOwner }}</strong>
    </div>
    <div>
      <small> {{ item.onDate | jalali: 'HH:mm YYYY/MM/DD' }}</small>
      <button mat-icon-button (click)="delete(item)">
        <i class="fa fa-times"></i>
      </button>
    </div>
  </div>
  <mat-card-content>
    <pre class="text-justify">{{ item.commentText }}</pre>
  </mat-card-content>
</mat-card>
