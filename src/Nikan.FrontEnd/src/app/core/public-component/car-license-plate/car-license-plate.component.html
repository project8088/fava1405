<div class="license-plate">
  <div class="input">
    <input  [(ngModel)]="s4" (change)="changeNum()" name="is4" numbersOnly maxlength="2" autocomplete="no-autocomplete"
           [attr.readonly]="disabled" [disabled]="disabled"/>
  </div>
  <div class="input">
    <input  [(ngModel)]="s3" (change)="changeNum()" name="is3" numbersOnly maxlength="3" autocomplete="no-autocomplete"
            [attr.readonly]="disabled" [disabled]="disabled"/>
  </div>

  <div class="input sss">
    <mat-select [(ngModel)]="s2" (selectionChange)="changeNum()" name="is2"
                 [attr.readonly]="disabled" [disabled]="disabled">
      <mat-option [value]="item" *ngFor="let item of letters">{{item}}</mat-option>
    </mat-select>
  </div>

  <div class="input">
    <input  [(ngModel)]="s1" (change)="changeNum()" name="is1" numbersOnly maxlength="2"  autocomplete="no-autocomplete"
            [attr.readonly]="disabled" [disabled]="disabled"/>
  </div>


</div>

<input type="hidden" [formControl]="ngControl.control" [required]="required" dir="ltr">
<small class="text-danger" *ngIf="ngControl?.hasError('required') && !disabled">
  شماره پلاک خودرو را وارد کنید
</small>
